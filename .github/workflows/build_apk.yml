name: Build Android APK

on:
  push:
    branches: [main, develop, desarrollo]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Verify directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in root directory ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "main.py" ] || [ -f "frp_freedom_android/android_app.py" ]; then
            echo "✅ Main application file found"
          else
            echo "❌ No main application file found!"
            echo "Buscando archivos Python..."
            find . -name "*.py" -type f | head -20
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found in root"
          else
            echo "❌ requirements.txt NOT found in root!"
            exit 1
          fi
          if [ -f "pyproject.toml" ]; then
            echo "✅ pyproject.toml found in root"
          else
            echo "⚠️ pyproject.toml NOT found (optional)"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libgtk-3-dev \
            mesa-utils \
            unzip \
            wget \
            curl \
            aapt \
            default-jre \
            default-jdk \
            file

      - name: Install bundletool (for AAB conversion)
        run: |
          wget https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar
          sudo mv bundletool-all-1.15.6.jar /usr/local/bin/bundletool.jar
          echo '#!/bin/bash' | sudo tee /usr/local/bin/bundletool
          echo 'java -jar /usr/local/bin/bundletool.jar "$@"' | sudo tee -a /usr/local/bin/bundletool
          sudo chmod +x /usr/local/bin/bundletool
          bundletool version || echo "bundletool installed"

      - name: Install dependencies
        run: |
          echo "Installing dependencies in: $(pwd)"
          pip install --upgrade pip

          # Eliminar cualquier referencia a jnius en requirements.txt
          if grep -q "jnius" requirements.txt 2>/dev/null; then
            echo "⚠️ Eliminando jnius de requirements.txt"
            sed -i '/jnius/d' requirements.txt
          fi

          # Instalar dependencias desde requirements.txt
          pip install -r requirements.txt || echo "⚠️ Algunas dependencias fallaron, continuando..."

          # Instalar dependencias adicionales necesarias
          pip install watchdog repath typing-extensions anyio httpx httpcore h11 idna certifi

          # Verificar instalación de flet
          python -c "import flet; print(f'Flet version: {flet.__version__}')" || echo "⚠️ Flet no instalado correctamente"

      - name: Upgrade Flet to latest version
        run: |
          echo "=== Actualizando Flet ==="
          pip install --upgrade flet

          # Verificar versión
          python -c "import flet; print(f'Flet version: {flet.__version__}')"

          # Si Flet es >= 0.22.0, usar nuevas opciones
          python -c "
          import flet
          version = tuple(map(int, flet.__version__.split('.')))
          if version >= (0, 22, 0):
              print('✅ Flet 0.22+ detectado')
              import os
              os.makedirs('.flet', exist_ok=True)
              with open('.flet/version', 'w') as f:
                  f.write('0.22.0')
          "

      - name: Verify flet installation
        run: |
          echo "=== Verifying flet installation ==="
          python -c "import flet; print(f'Flet version: {flet.__version__}')"
          which flet || echo "flet not in PATH"
          flet --version || echo "flet command not available"
          # Verificar dependencias clave
          python -c "import yaml; print('✅ yaml installed')" || echo "❌ yaml no instalado"
          python -c "import cryptography; print('✅ cryptography installed')" || echo "❌ cryptography no instalado"
          python -c "import requests; print('✅ requests installed')" || echo "❌ requests no instalado"
          python -c "import msgpack; print('✅ msgpack installed')" || echo "❌ msgpack no instalado"

          # Verificar que jnius NO esté instalado
          if pip list | grep -q jnius; then
            echo "❌ jnius encontrado - desinstalando..."
            pip uninstall -y jnius pyjnius || true
          else
            echo "✅ jnius no encontrado"
          fi

      - name: Fix typing imports in Python files
        run: |
          echo "=== Verificando y corrigiendo importaciones de typing ==="

          # Buscar archivos que usen List, Dict, Optional sin importar
          find frp_freedom_android -name "*.py" -type f | while read file; do
            if grep -q "List\[" "$file" && ! grep -q "from typing import.*List" "$file"; then
              echo "⚠️ $file usa List pero no lo importa - corrigiendo..."
              sed -i '1i from typing import List, Dict, Optional, Any, Union' "$file"
            fi
            if grep -q "Dict\[" "$file" && ! grep -q "from typing import.*Dict" "$file"; then
              echo "⚠️ $file usa Dict pero no lo importa - corrigiendo..."
              sed -i '1i from typing import List, Dict, Optional, Any, Union' "$file"
            fi
            if grep -q "Optional\[" "$file" && ! grep -q "from typing import.*Optional" "$file"; then
              echo "⚠️ $file usa Optional pero no lo importa - corrigiendo..."
              sed -i '1i from typing import List, Dict, Optional, Any, Union' "$file"
            fi
          done

      - name: Test application imports locally
        run: |
          echo "=== Probando imports de la aplicación ==="

          # Verificar sintaxis de Python primero
          echo "=== Verificando sintaxis de Python ==="
          find frp_freedom_android -name "*.py" -type f -exec python -m py_compile {} \; -print || {
            echo "❌ Error de sintaxis en algún archivo Python"
            exit 1
          }
          echo "✅ Todos los archivos tienen sintaxis correcta"

          # Verificar que se puede importar el módulo principal
          python -c "
          import sys
          import os
          sys.path.insert(0, os.getcwd())

          try:
              from frp_freedom_android.android_app import main
              print('✅ Import desde frp_freedom_android exitoso')
          except ImportError as e:
              print(f'❌ Fallo en import desde frp_freedom_android: {e}')
              try:
                  from android_app import main
                  print('✅ Import desde android_app exitoso')
              except ImportError as e2:
                  print(f'❌ Fallo en import desde android_app: {e2}')
                  sys.exit(1)
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"
          cache: true

      - name: Verify Flutter installation
        run: |
          echo "=== Verifying Flutter installation ==="
          flutter --version
          flutter doctor -v

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          # Crear estructura de directorios para Android SDK
          mkdir -p android-sdk/cmdline-tools

          # Descargar command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          # Extraer en una ubicación temporal
          unzip commandlinetools-linux-11076708_latest.zip -d tmp_cmdline

          # Mover a la ubicación correcta (cmdline-tools/latest/)
          mkdir -p android-sdk/cmdline-tools/latest
          mv tmp_cmdline/cmdline-tools/* android-sdk/cmdline-tools/latest/
          rm -rf tmp_cmdline

          # Configurar variables de entorno
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH

          # Agregar también al PATH actual
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"

          # Verificar estructura antes de continuar
          echo "=== Verifying Android SDK structure ==="
          ls -la android-sdk/cmdline-tools/latest/bin/ || echo "❌ sdkmanager directory not found!"
          which sdkmanager || echo "⚠️ sdkmanager not in PATH yet"

      - name: Accept Android Licenses and Install SDK Components
        run: |
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"

          # Aceptar licencias (sin interacción)
          yes | sdkmanager --licenses || true

          # Instalar las versiones correctas de Android SDK
          sdkmanager "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platforms;android-35"

      - name: Accept Flutter Android Licenses
        run: |
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          flutter config --android-sdk $ANDROID_SDK_ROOT
          yes | flutter doctor --android-licenses || true

      - name: Create .fletignore file
        run: |
          echo "# Exclude jnius and other problematic dependencies" > .fletignore
          echo "**/jnius*" >> .fletignore
          echo "**/pyjnius*" >> .fletignore
          echo "**/kivy*" >> .fletignore
          echo "**/build/*" >> .fletignore
          echo "**/__pycache__/*" >> .fletignore
          echo "**/*.pyc" >> .fletignore
          echo "**/tests/*" >> .fletignore
          echo "**/test_*.py" >> .fletignore
          echo "**/venv/*" >> .fletignore
          echo "**/.git/*" >> .fletignore

      - name: Create Flet Android configuration
        run: |
          echo "=== Creando configuración para Flet Android ==="

          # Crear directorio de configuración
          mkdir -p .flet/android

          # Crear build.gradle personalizado
          cat > .flet/android/build.gradle << 'EOF'
          android {
              defaultConfig {
                  minSdkVersion 23
                  targetSdkVersion 36
              }
              compileSdkVersion 36
              ndkVersion "27.0.12077973"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          EOF

          echo "✅ build.gradle creado"
          cat .flet/android/build.gradle

          echo ""
          echo "=== Creando flet_config.yaml ==="
          cat > flet_config.yaml << 'EOF'
          android:
            min_sdk_version: 23
            target_sdk_version: 36
            compile_sdk_version: 36
            ndk_version: "27.0.12077973"
            build:
              skip_android_deps: true
            dependencies:
              skip:
                - jnius
                - pyjnius
                - kivy
                - plyer
          EOF

          echo "✅ flet_config.yaml creado"
          cat flet_config.yaml

          echo ""
          echo "=== Creando .flet/properties ==="
          mkdir -p .flet
          cat > .flet/properties << 'EOF'
          android.minSdkVersion=23
          android.targetSdkVersion=36
          android.compileSdkVersion=36
          android.ndkVersion=27.0.12077973
          android.skipAndroidDeps=true
          EOF

          echo "✅ .flet/properties creado"
          cat .flet/properties

      - name: Ensure main.py exists and is valid
        run: |
          echo "=== Verificando estructura del proyecto ==="

          echo "Estructura del directorio:"
          find . -name "*.py" -type f | head -30 | sort

          echo ""
          echo "=== Verificando main.py en raíz ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py encontrado en raíz"
            echo "Contenido:"
            cat main.py
          else
            echo "❌ ERROR: main.py no encontrado en raíz"
            # Crear main.py
            cat > main.py << 'PYEOF'
          #!/usr/bin/env python3
          """
          FRP Freedom Android - Punto de entrada para Flet
          """

          import sys
          import os

          sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))

          def main():
              try:
                  from frp_freedom_android.android_app import main as app_main
                  app_main()
              except ImportError as e:
                  print(f"Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          PYEOF
            echo "✅ main.py creado"
          fi

          echo ""
          echo "=== Verificando frp_freedom_android/ ==="
          if [ -d "frp_freedom_android" ]; then
            echo "✅ Directorio frp_freedom_android/ existe"
            echo "Contenido:"
            ls -la frp_freedom_android/
            
            # Verificar archivos necesarios
            REQUIRED_FILES=("__init__.py" "android_app.py" "android_config.py" "platform_adapter.py")
            MISSING_FILES=()
            
            for file in "${REQUIRED_FILES[@]}"; do
              if [ -f "frp_freedom_android/$file" ]; then
                echo "✅ $file encontrado"
              else
                echo "❌ $file NO encontrado"
                MISSING_FILES+=("$file")
              fi
            done
            
            if [ ${#MISSING_FILES[@]} -gt 0 ]; then
              echo "ERROR: Faltan archivos en frp_freedom_android/: ${MISSING_FILES[*]}"
              
              # Intentar copiar desde la raíz si existen
              for file in "${MISSING_FILES[@]}"; do
                if [ -f "$file" ]; then
                  cp "$file" frp_freedom_android/
                  echo "✅ $file copiado desde raíz"
                fi
              done
            fi
            
            # Verificar subdirectorios
            SUBDIRS=("adapters" "core_android" "models" "views")
            for dir in "${SUBDIRS[@]}"; do
              if [ -d "frp_freedom_android/$dir" ]; then
                echo "✅ $dir/ encontrado"
              elif [ -d "$dir" ]; then
                echo "⚠️ $dir/ encontrado en raíz, moviendo..."
                mv "$dir" frp_freedom_android/
                echo "✅ $dir/ movido a frp_freedom_android/"
              else
                echo "⚠️ $dir/ no encontrado (puede que no sea necesario)"
              fi
            done
            
          else
            echo "❌ ERROR: Directorio frp_freedom_android/ no existe"
            # Crear el directorio y mover archivos
            mkdir -p frp_freedom_android
            for file in android_app.py android_config.py platform_adapter.py __init__.py; do
              if [ -f "$file" ]; then
                mv "$file" frp_freedom_android/
                echo "✅ $file movido a frp_freedom_android/"
              fi
            done
            for dir in adapters core_android models views; do
              if [ -d "$dir" ]; then
                mv "$dir" frp_freedom_android/
                echo "✅ $dir/ movido a frp_freedom_android/"
              fi
            done
          fi

          echo ""
          echo "=== Verificando __init__.py ==="
          if [ -f "frp_freedom_android/__init__.py" ]; then
            echo "✅ __init__.py existe"
            echo "Contenido:"
            cat frp_freedom_android/__init__.py
          else
            echo "❌ ERROR: __init__.py no existe en frp_freedom_android/"
            cat > frp_freedom_android/__init__.py << 'EOF'
          """
          FRP Freedom - Android APK Interface
          A Flet-based Android application for FRP bypass
          """

          __version__ = "1.0.0"
          __author__ = "FRP Freedom Project"

          from .android_app import main
          EOF
            echo "✅ __init__.py creado"
          fi

          # Verificar sintaxis de todos los archivos Python
          echo ""
          echo "=== Verificando sintaxis de todos los archivos Python ==="
          find frp_freedom_android -name "*.py" -type f -exec python -m py_compile {} \; -print || {
            echo "❌ Error de sintaxis en algún archivo Python"
            exit 1
          }
          echo "✅ Todos los archivos Python tienen sintaxis correcta"

      - name: Debug Flet build process
        run: |
          echo "=== Simulando el proceso de construcción de Flet ==="

          # Verificar que Flet reconoce el proyecto
          echo "=== Información del proyecto ==="
          python -c "
          import os
          import sys
          import flet

          print(f'Flet version: {flet.__version__}')
          print(f'Python version: {sys.version}')
          print(f'Current directory: {os.getcwd()}')
          print(f'Files in current directory: {os.listdir()}')
          print(f'Files in frp_freedom_android: {os.listdir(\"frp_freedom_android\") if os.path.exists(\"frp_freedom_android\") else \"No existe\"}')

          # Intentar importar el módulo principal
          try:
              import main
              print('✅ main module imported successfully')
          except ImportError as e:
              print(f'❌ Could not import main: {e}')
              # Intentar importar desde la estructura alternativa
              try:
                  import frp_freedom_android.android_app
                  print('✅ android_app imported successfully')
              except ImportError as e2:
                  print(f'❌ Could not import android_app: {e2}')
          "

      - name: Build APK with detailed logging
        id: build_apk
        run: |
          echo "Building APK in: $(pwd)"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export FLET_VERBOSE=1
          export FLET_LOG_LEVEL=DEBUG
          export FLET_ANDROID_BUILD=true
          export FLET_CLI_NO_PROMPT=1
          export FLET_AGREE_TO_INSTALL_FLUTTER=1

          echo "=== Environment ==="
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "PATH: $PATH"
          echo "Python: $(which python)"
          echo "Python version: $(python --version)"
          echo "Pip: $(which pip)"

          # Verificar todas las dependencias
          echo "=== Dependencias instaladas ==="
          pip list

          # Verificar que no haya conflictos
          echo "=== Verificando conflictos ==="
          if pip check; then
            echo "✅ No hay conflictos de dependencias"
          else
            echo "⚠️ Conflictos detectados, intentando resolver..."
            pip install --upgrade flet pyyaml cryptography requests urllib3 msgpack
          fi

          # Verificar Flutter
          echo "=== Flutter doctor ==="
          flutter doctor -v

          # Limpiar construcciones anteriores
          echo "=== Limpiando construcciones anteriores ==="
          rm -rf build/ dist/ .flet-build/ android/

          # Verificar espacio en disco
          echo "=== Espacio en disco ==="
          df -h

          # Verificar configuración de Flet
          echo "=== Verificando configuración de Flet ==="
          if [ -d ".flet" ]; then
            echo "✅ .flet/ existe"
            find .flet -type f -exec echo "   {}" \;
          else
            echo "⚠️ .flet/ no existe"
          fi

          if [ -f "flet_config.yaml" ]; then
            echo "✅ flet_config.yaml existe"
            cat flet_config.yaml
          else
            echo "⚠️ flet_config.yaml no existe"
          fi

          # Verificar que main.py existe
          if [ -f "main.py" ]; then
            echo "✅ main.py existe"
          else
            echo "❌ main.py NO existe - creando..."
            cat > main.py << 'EOF'
          #!/usr/bin/env python3
          import sys
          import os
          sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))

          def main():
              try:
                  from frp_freedom_android.android_app import main as app_main
                  app_main()
              except ImportError as e:
                  print(f"Error: {e}")
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF
          fi

          # Intentar construir con opciones específicas
          echo "=== Iniciando construcción ==="
          echo "Comando: flet build apk --build-number ${{ github.run_number }} --yes --verbose"

          # Ejecutar flet build con opciones adicionales
          set -x
          flet build apk \
            --build-number ${{ github.run_number }} \
            --yes \
            --verbose \
            2>&1 | tee build_full.log

          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set +x

          echo "Exit code: $BUILD_EXIT_CODE"

          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ Construcción exitosa"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Error en la construcción (código: $BUILD_EXIT_CODE)"
            
            # Buscar errores específicos en el log
            echo "=== Buscando errores específicos ==="
            grep -E "error|exception|failed|FAILED" build_full.log | head -30
            
            # Buscar específicamente el error de minSdk
            echo "=== Buscando errores de minSdk ==="
            grep -i "minsdk\|minsdkversion" build_full.log || echo "No se encontraron errores de minSdk"
            
            # Buscar errores de Gradle
            echo "=== Buscando errores de Gradle ==="
            grep -i "gradle" build_full.log | head -20 || echo "No se encontraron errores de Gradle"
            
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Build APK in debug mode (fallback)
        if: steps.build_apk.outputs.build_status == 'failed' || failure()
        id: build_debug
        run: |
          echo "=== Intentando construir en modo debug (fallback) ==="
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export FLET_VERBOSE=1
          export FLET_LOG_LEVEL=DEBUG
          export FLET_CLI_NO_PROMPT=1
          export FLET_AGREE_TO_INSTALL_FLUTTER=1

          # Crear configuración para debug
          mkdir -p .flet
          cat > .flet/properties << 'EOF'
          android.minSdkVersion=21
          android.targetSdkVersion=36
          android.compileSdkVersion=36
          android.ndkVersion=27.0.12077973
          android.skipAndroidDeps=true
          EOF

          echo "✅ Configuración de debug creada"
          cat .flet/properties

          # Limpiar construcciones anteriores
          rm -rf build/ dist/ .flet-build/ android/

          # Construir en modo debug
          echo "=== Construyendo en modo debug ==="
          flet build apk \
            --build-number ${{ github.run_number }} \
            --yes \
            --verbose \
            2>&1 | tee build_debug.log

          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Construcción en modo debug exitosa"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Construcción en modo debug falló"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Debug build directory
        if: always()
        run: |
          echo "=== Debug: Contenido del directorio después del build ==="
          echo "Directorio actual:"
          ls -la
          echo ""
          echo "Buscando directorios de build:"
          find . -type d -name "build" -o -name "dist" -o -name ".flet-build" | head -20
          echo ""
          echo "Buscando archivos .apk:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No se encontraron APK"
          echo ""
          echo "Buscando archivos .aab:"
          find . -name "*.aab" -type f 2>/dev/null || echo "No se encontraron AAB"
          echo ""
          echo "Buscando archivos .apks:"
          find . -name "*.apks" -type f 2>/dev/null || echo "No se encontraron APKS"
          echo ""
          echo "Contenido de .flet-build si existe:"
          if [ -d ".flet-build" ]; then
            ls -la .flet-build/
          fi
          echo ""
          echo "Contenido de build si existe:"
          if [ -d "build" ]; then
            ls -la build/
            if [ -d "build/app" ]; then
              echo "Contenido de build/app:"
              ls -la build/app/
              if [ -d "build/app/outputs" ]; then
                echo "Contenido de build/app/outputs:"
                find build/app/outputs -type f | head -20
              fi
            fi
          fi

      - name: Check for AAB files and convert to APK
        id: check_aab
        if: always()
        run: |
          echo "=== Buscando archivos AAB (Android App Bundle) ==="
          AAB_FILES=$(find . -name "*.aab" -type f 2>/dev/null)
          if [ -n "$AAB_FILES" ]; then
            echo "✅ Se encontraron archivos AAB:"
            echo "$AAB_FILES"
            echo ""
            echo "Intentando convertir AAB a APK..."
            
            # Crear directorio para APKs convertidos
            mkdir -p converted_apks
            
            for aab in $AAB_FILES; do
              echo "Convirtiendo $aab a APK..."
              aab_name=$(basename "$aab" .aab)
              
              # Usar bundletool para convertir
              bundletool build-apks \
                --bundle="$aab" \
                --output="converted_apks/${aab_name}.apks" \
                --mode=universal
              
              # Extraer APK universal del archivo APKS
              if [ -f "converted_apks/${aab_name}.apks" ]; then
                echo "✅ APKS generado: converted_apks/${aab_name}.apks"
                # Extraer el APK universal
                unzip -p "converted_apks/${aab_name}.apks" "universal.apk" > "converted_apks/${aab_name}.apk" 2>/dev/null || \
                unzip -p "converted_apks/${aab_name}.apks" "*.apk" > "converted_apks/${aab_name}.apk" 2>/dev/null
                
                if [ -f "converted_apks/${aab_name}.apk" ]; then
                  echo "✅ APK convertido: converted_apks/${aab_name}.apk"
                fi
              fi
            done
            
            # Mover APKs convertidos a la ubicación esperada
            if ls converted_apks/*.apk 1> /dev/null 2>&1; then
              mkdir -p build/app/outputs/flutter-apk/
              cp converted_apks/*.apk build/app/outputs/flutter-apk/ 2>/dev/null || true
            fi
          else
            echo "❌ No se encontraron archivos AAB"
          fi

      - name: Try alternative build methods if needed
        if: steps.build_apk.outputs.build_status == 'failed' && steps.build_debug.outputs.build_status == 'failed'
        run: |
          echo "=== Intentando métodos alternativos de construcción ==="
          export FLET_CLI_NO_PROMPT=1
          export FLET_AGREE_TO_INSTALL_FLUTTER=1

          # Intentar con --no-android-sdk-check
          echo "=== Método 1: Sin verificación de SDK ==="
          export FLET_SKIP_ANDROID_SDK_CHECK=1
          flet build apk \
            --build-number ${{ github.run_number }} \
            --yes \
            --verbose \
            2>&1 | tee build_alt1.log || true

          # Intentar sin flags adicionales
          echo "=== Método 2: Construcción básica ==="
          flet build apk \
            --yes \
            2>&1 | tee build_alt2.log || true

      - name: Verify APK was created
        id: verify_apk
        run: |
          echo "=== Verificando que el APK fue creado ==="

          # Buscar archivos APK en todas las ubicaciones posibles
          echo "Buscando en ubicaciones comunes..."

          # Buscar en varias ubicaciones
          APK_PATHS=(
            "build/app/outputs/flutter-apk/*.apk"
            "build/app/outputs/apk/**/*.apk"
            "build/**/*.apk"
            ".flet-build/**/*.apk"
            "converted_apks/*.apk"
            "*.apk"
          )

          APK_FILES=""
          for pattern in "${APK_PATHS[@]}"; do
            echo "Buscando: $pattern"
            FOUND=$(find . -path "./$pattern" -type f 2>/dev/null || echo "")
            if [ -n "$FOUND" ]; then
              APK_FILES="$APK_FILES $FOUND"
              echo "✅ Encontrado en $pattern"
            fi
          done

          # Si no encuentra con find, buscar en todo el directorio
          if [ -z "$APK_FILES" ]; then
            echo "Buscando en todo el directorio..."
            APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null || echo "")
          fi

          if [ -n "$APK_FILES" ]; then
            echo "✅ APK encontrado:"
            echo "$APK_FILES" | tr ' ' '\n'
            echo ""
            echo "=== Información del APK ==="
            for apk in $APK_FILES; do
              if [ -f "$apk" ]; then
                echo "Archivo: $apk"
                ls -la "$apk"
                echo "Tamaño: $(du -h "$apk" | cut -f1)"
                echo "Tipo de archivo: $(file "$apk")"
                if command -v aapt &> /dev/null; then
                  echo "Información del APK:"
                  aapt dump badging "$apk" | head -10 || echo "No se pudo leer el APK"
                fi
                echo ""
              fi
            done
            echo "apk_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ CRÍTICO: No se encontró ningún archivo APK"
            echo ""
            echo "=== Análisis de directorios ==="
            echo "Contenido del directorio actual:"
            ls -la
            echo ""
            echo "Buscando cualquier archivo .apk en todo el sistema:"
            find / -name "*.apk" -type f 2>/dev/null | head -20 || echo "No se encontraron APK"
            echo ""
            echo "Buscando archivos .aab (posiblemente generados en vez de APK):"
            find . -name "*.aab" -type f 2>/dev/null || echo "No se encontraron AAB"
            echo ""
            echo "Buscando archivos .apks:"
            find . -name "*.apks" -type f 2>/dev/null || echo "No se encontraron APKS"
            echo ""
            echo "Directorio de trabajo de Flutter:"
            flutter --version
            echo ""
            echo "Proyectos Flutter en el directorio:"
            find . -name "pubspec.yaml" -type f || echo "No se encontraron proyectos Flutter"
            echo ""
            echo "=== Últimas líneas del build_full.log ==="
            if [ -f "build_full.log" ]; then
              tail -50 build_full.log
            fi
            echo ""
            echo "=== Últimas líneas del build_debug.log ==="
            if [ -f "build_debug.log" ]; then
              tail -50 build_debug.log
            fi
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ============================================
      # NUEVOS PASOS PARA CREAR RELEASE AUTOMÁTICO
      # ============================================

      - name: Get version from pyproject.toml
        id: get_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.verify_apk.outputs.apk_exists == 'true'
        run: |
          echo "=== Obteniendo versión del proyecto ==="
          # Extraer versión de pyproject.toml
          if [ -f "pyproject.toml" ]; then
            VERSION=$(grep -m1 '^version = "' pyproject.toml | sed 's/version = "//' | sed 's/"//')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "✅ Versión encontrada: $VERSION"
          else
            echo "⚠️ pyproject.toml no encontrado, usando versión por defecto"
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Find and rename APK for release
        id: find_apk
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.verify_apk.outputs.apk_exists == 'true'
        run: |
          echo "=== Preparando APK para Release ==="

          # Buscar el APK generado (priorizar el de release)
          APK_FILE=$(find . -name "*.apk" -type f | grep -v "converted" | head -1)

          if [ -n "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
            # Crear nombre descriptivo para el release
            VERSION="${{ steps.get_version.outputs.version }}"
            APK_NAME="FRP-Freedom-v${VERSION}-build${{ github.run_number }}.apk"
            cp "$APK_FILE" "$APK_NAME"
            echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
            echo "✅ APK renombrado a: $APK_NAME"
            echo "Tamaño: $(du -h "$APK_NAME" | cut -f1)"
          else
            echo "❌ No se encontró APK para el release"
            exit 1
          fi

      - name: Create Release
        id: create_release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.verify_apk.outputs.apk_exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-build${{ github.run_number }}
          name: "FRP Freedom v${{ steps.get_version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## 🚀 FRP Freedom Android APK

            ### 📱 Descarga directa
            - **APK**: [${{ steps.find_apk.outputs.apk_name }}](./${{ steps.find_apk.outputs.apk_name }})

            ### 🔧 Información de la build
            - **Versión**: ${{ steps.get_version.outputs.version }}
            - **Build**: ${{ github.run_number }}
            - **Fecha**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### 📦 Contenido del Release
            - 1 archivo APK listo para instalar

            ### 📋 Notas
            - APK firmado con clave de depuración (debug)
            - Compatible con Android 7.0+ (API 24+)

            ### 🔗 Enlaces útiles
            - [Ver código fuente](https://github.com/${{ github.repository }}/tree/${{ github.sha }})
            - [Reportar problema](https://github.com/${{ github.repository }}/issues)
          files: ${{ steps.find_apk.outputs.apk_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android
          path: |
            build/**/*.apk
            **/build/**/*.apk
            **/outputs/**/*.apk
            converted_apks/*.apk
            *.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload project source code artifact (compressed)
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-project-source
          path: frp-freedom-android-project_*.tar.gz
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload build logs (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_full.log
            build_debug.log
            build.log
            build_alt*.log
            *.log
          retention-days: 7

      # ============================================
      # PASOS DE INFORMACIÓN DEL RELEASE
      # ============================================

      - name: Output download links
        if: steps.verify_apk.outputs.apk_exists == 'true'
        run: |
          echo "================================================"
          echo "✅ APK GENERADO EXITOSAMENTE"
          echo "================================================"
          echo ""
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "📱 DESCARGA DIRECTA (RELEASE):"
            echo "   https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.version }}-build${{ github.run_number }}"
            echo ""
            echo "📥 URL DIRECTA DEL APK:"
            echo "   https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}-build${{ github.run_number }}/${{ steps.find_apk.outputs.apk_name }}"
          else
            echo "📦 ARTIFACT (ZIP):"
            echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          echo ""
          echo "================================================"

      - name: Critical error - APK not created
        if: steps.verify_apk.outputs.apk_exists == 'false' || failure()
        run: |
          echo "::error::🚨 ERROR CRÍTICO: El APK no fue creado correctamente"
          echo "::error::📱 La aplicación no pudo ser compilada para Android"
          echo "::error::🔍 Por favor, revisa los logs anteriores para identificar el problema"
          echo "::error::💡 Asegúrate de que:"
          echo "::error::   - El código fuente es correcto"
          echo "::error::   - Todas las dependencias están instaladas"
          echo "::error::   - Flet está configurado correctamente"
          echo "::error::   - Hay suficiente espacio en disco"
          echo "::error::   - Los permisos de Android están configurados"
          echo "::error::   - El archivo main.py existe y es accesible"
          echo "::error::   - El SDK de Android está correctamente configurado"
          echo "::error::🔧 Acciones recomendadas:"
          echo "::error::   1. Revisa el archivo build_full.log en los artifacts"
          echo "::error::   2. Verifica que el código compile localmente con 'flet build apk'"
          echo "::error::   3. Asegúrate de que todas las dependencias están actualizadas"
          echo "::error::   4. Verifica la configuración de Android SDK"
          echo "::error::   5. Si el build genera AAB, se intentará convertir automáticamente"
          echo "::error::   6. Revisa el artifact 'build-logs' para más detalles"
          echo "::error::   7. Ejecuta 'flet build apk --verbose' localmente para ver el error exacto"
          exit 1

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          echo "Installing test dependencies in: $(pwd)"
          pip install --upgrade pip
          pip install -r requirements.txt || echo "⚠️ Algunas dependencias fallaron"
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          echo "Running tests in: $(pwd)"
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "⚠️ No tests directory found, skipping tests"
            echo '<?xml version="1.0"?><coverage></coverage>' > coverage.xml
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  android-compatibility:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && needs.build.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if artifact exists
        id: check_artifact
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifact = artifacts.artifacts.find(a => a.name === 'frp-freedom-android');
            if (artifact) {
              console.log('✅ Artifact found');
              core.setOutput('exists', 'true');
              core.setOutput('size', artifact.size_in_bytes);
              core.setOutput('created', artifact.created_at);
            } else {
              console.log('❌ Artifact not found');
              core.setOutput('exists', 'false');
            }

      - name: Install aapt and bundletool
        run: |
          sudo apt-get update
          sudo apt-get install -y aapt unzip
          wget https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar
          sudo mv bundletool-all-1.15.6.jar /usr/local/bin/bundletool.jar
          echo '#!/bin/bash' | sudo tee /usr/local/bin/bundletool
          echo 'java -jar /usr/local/bin/bundletool.jar "$@"' | sudo tee -a /usr/local/bin/bundletool
          sudo chmod +x /usr/local/bin/bundletool

      - name: Download APK
        if: steps.check_artifact.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-android
          path: apk/

      - name: Analyze APK
        if: steps.check_artifact.outputs.exists == 'true'
        run: |
          echo "=== Análisis del APK ==="
          echo "✅ APK encontrado para análisis"

          # Buscar todos los APK descargados
          APK_FILES=$(find apk/ -name "*.apk" -type f 2>/dev/null)

          if [ -n "$APK_FILES" ]; then
            echo ""
            echo "=== Archivos APK encontrados ==="
            echo "$APK_FILES"
            echo ""
            
            for apk in $APK_FILES; do
              echo "=== Información del APK: $(basename $apk) ==="
              echo "Tamaño: $(du -h "$apk" | cut -f1)"
              echo "Ubicación: $apk"
              echo ""
              
              if command -v aapt &> /dev/null; then
                echo "Información detallada del APK:"
                aapt dump badging "$apk" || echo "⚠️ No se pudo leer la información del APK"
                echo ""
              fi
              
              echo "Estructura del APK:"
              unzip -l "$apk" | head -20 || echo "⚠️ No se pudo listar el contenido del APK"
              echo ""
            done
          else
            echo "❌ No se encontraron archivos APK para analizar"
            exit 1
          fi

      - name: Report missing artifact
        if: steps.check_artifact.outputs.exists == 'false'
        run: |
          echo "::warning::⚠️ No se encontró el artifact frp-freedom-android para analizar"
          echo "::warning::📱 Esto puede deberse a que:"
          echo "::warning::   - El job 'build' falló o se saltó"
          echo "::warning::   - El APK no se generó correctamente"
          echo "::warning::   - El artifact expiró o fue eliminado"
          echo "::warning::🔍 Revisa los logs del job 'build' para más información"

      - name: Compatibility check summary
        if: always()
        run: |
          echo "=== Resumen de compatibilidad Android ==="
          if [ "${{ steps.check_artifact.outputs.exists }}" == "true" ]; then
            echo "✅ APK disponible para análisis"
            echo "📱 El APK puede ser probado en dispositivos Android"
          else
            echo "❌ No hay APK disponible para análisis"
            echo "🔧 Se requiere revisar el proceso de construcción"
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build, test, android-compatibility]
    if: failure()

    steps:
      - name: Notify about build failure
        run: |
          echo "::error::🚨 EL WORKFLOW HA FALLADO"
          echo "::error::📋 Revisa los siguientes jobs:"
          echo "::error::  - Build: ${{ needs.build.result }}"
          echo "::error::  - Test: ${{ needs.test.result }}"
          echo "::error::  - Android Compatibility: ${{ needs.android-compatibility.result }}"
          echo "::error::🔧 Acciones recomendadas:"
          echo "::error::  1. Revisa los logs de error"
          echo "::error::  2. Verifica que el código compile localmente"
          echo "::error::  3. Asegúrate de que todas las dependencias están actualizadas"
          echo "::error::  4. Verifica la configuración de Android SDK"
          echo "::error::  5. Revisa el artifact 'build-logs' para más detalles"
          echo "::error::  6. Ejecuta 'flet build apk --verbose' localmente para ver el error exacto"
          exit 1
