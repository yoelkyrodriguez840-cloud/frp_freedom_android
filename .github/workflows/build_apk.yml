name: Build Android APK

# contruccion dwl flujo de trabaho para contruir la apk

on:
  push:
    branches: [main, develop]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Verify directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in root directory ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py found in root"
          else
            echo "❌ main.py NOT found in root!"
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found in root"
          else
            echo "❌ requirements.txt NOT found in root!"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libgtk-3-dev

      - name: Install dependencies
        run: |
          echo "Installing dependencies in: $(pwd)"
          pip install --upgrade pip

          # Instalar dependencias desde requirements.txt
          pip install -r requirements.txt

          # Verificar instalación de flet
          python -c "import flet; print(f'Flet version: {flet.__version__}')"

          # Verificar que watchdog esté instalado (dependencia de flet)
          python -c "import watchdog; print('watchdog installed')" 2>/dev/null || echo "watchdog not found (but it's fine)"

      - name: Verify flet installation
        run: |
          echo "=== Verifying flet installation ==="
          python -c "import flet; print(f'Flet version: {flet.__version__}')"
          which flet || echo "flet not in PATH"
          flet --version || echo "flet command not available"
          # Verificar dependencias clave
          python -c "import yaml; print('✅ yaml installed')"
          python -c "import cryptography; print('✅ cryptography installed')"
          python -c "import requests; print('✅ requests installed')"
          python -c "import msgpack; print('✅ msgpack installed')"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: "stable"
          cache: true

      - name: Verify Flutter installation
        run: |
          echo "=== Verifying Flutter installation ==="
          flutter --version
          flutter doctor -v

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          # Crear estructura de directorios para Android SDK
          mkdir -p android-sdk/cmdline-tools

          # Descargar command line tools (versión más reciente)
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          # Extraer en una ubicación temporal
          unzip commandlinetools-linux-11076708_latest.zip -d tmp_cmdline

          # Mover a la ubicación correcta (cmdline-tools/latest/)
          mkdir -p android-sdk/cmdline-tools/latest
          mv tmp_cmdline/cmdline-tools/* android-sdk/cmdline-tools/latest/
          rm -rf tmp_cmdline

          # Configurar variables de entorno
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH

          # Agregar también al PATH actual
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"

          # Verificar estructura antes de continuar
          echo "=== Verifying Android SDK structure ==="
          ls -la android-sdk/cmdline-tools/latest/bin/ || echo "❌ sdkmanager directory not found!"
          which sdkmanager || echo "⚠️ sdkmanager not in PATH yet"

      - name: Accept Android Licenses and Install SDK Components
        run: |
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"

          # Aceptar licencias (sin interacción)
          yes | sdkmanager --licenses || true

          # Instalar las versiones correctas de Android SDK
          # Flutter 3.24.5 requiere Android SDK 36 y build-tools 28.0.3 o superiores
          sdkmanager "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "build-tools;34.0.0" \
            "platforms;android-34"

          # También instalar versiones adicionales para compatibilidad
          sdkmanager "platforms;android-33" \
            "build-tools;33.0.2" \
            "platforms;android-35"

      - name: Accept Flutter Android Licenses
        run: |
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          flutter config --android-sdk $ANDROID_SDK_ROOT
          yes | flutter doctor --android-licenses || true

      - name: Create .fletignore file to exclude problematic dependencies
        run: |
          echo "# Exclude jnius and other problematic dependencies" > .fletignore
          echo "**/jnius*" >> .fletignore
          echo "**/pyjnius*" >> .fletignore
          echo "**/kivy*" >> .fletignore

      - name: Build APK
        run: |
          echo "Building APK in: $(pwd)"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          echo "Using Android SDK at: $ANDROID_SDK_ROOT"
          echo "Using Flutter at: $(which flutter)"

          # Verificar que las dependencias de Android estén instaladas
          flutter doctor -v

          # Comando con opciones adicionales para evitar problemas
          flet build apk \
            --build-number ${{ github.run_number }} \
            --yes \
            --verbose

      - name: Debug - List build output
        run: |
          echo "=== Checking build output ==="
          echo "Current directory: $(pwd)"
          echo ""
          echo "=== Directory contents ==="
          ls -la
          echo ""
          echo "=== Looking for build directory ==="
          if [ -d "build" ]; then
            echo "✅ Build directory found"
            echo ""
            echo "=== Build directory contents ==="
            ls -la build/
            echo ""
            echo "=== Looking for APK files ==="
            find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found in build"
          else
            echo "❌ Build directory not found"
            echo "Searching for any APK files..."
            find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android
          path: build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK to release (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-release
          path: build/**/*.apk
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          echo "Installing test dependencies in: $(pwd)"
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          echo "Running tests in: $(pwd)"
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "⚠️ No tests directory found, skipping tests"
            echo '<?xml version="1.0"?><coverage></coverage>' > coverage.xml
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  android-compatibility:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-android
          path: apk/

      - name: Analyze APK
        run: |
          echo "=== APK Analysis ==="
          echo "APK Size:"
          ls -la apk/
          echo ""
          echo "APK Contents:"
          find apk/ -name "*.apk" -exec file {} \;
          echo ""
          echo "APK Info:"
          if command -v aapt &> /dev/null; then
            find apk/ -name "*.apk" -exec aapt dump badging {} \;
          else
            echo "aapt not available - installing..."
            sudo apt-get update && sudo apt-get install -y aapt
            find apk/ -name "*.apk" -exec aapt dump badging {} \;
          fi
