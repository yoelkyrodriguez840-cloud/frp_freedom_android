name: Build Android APK

on:
  push:
    branches: [main, develop]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:
    # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd frp_freedom_android
          pip install -r requirements.txt
          pip install flet

      - name: Setup Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip -d android-sdk
          mkdir -p android-sdk/cmdline-tools
          mv android-sdk/cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Build APK
        run: |
          cd frp_freedom_android
          python -m flet build apk \
            --build-number ${{ github.run_number }} \
            --version 1.0.${{ github.run_number }} \
            --android-sdk $ANDROID_SDK_ROOT

      - name: Debug - List build output
        run: |
          echo "Listing build directory:"
          ls -la frp_freedom_android/build/
          echo "Listing APK directory:"
          find frp_freedom_android/build -name "*.apk" -ls

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android
          path: frp_freedom_android/build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK to release (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-release
          path: frp_freedom_android/build/**/*.apk
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          cd frp_freedom_android
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd frp_freedom_android
          python -m pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./frp_freedom_android/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Job para verificar la compatibilidad con Android
  android-compatibility:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-android
          path: apk/

      - name: Analyze APK
        run: |
          echo "APK Size:"
          ls -la apk/
          echo ""
          echo "APK Contents:"
          find apk/ -name "*.apk" -exec file {} \;
          echo ""
          echo "APK Info (if aapt available):"
          if command -v aapt &> /dev/null; then
            find apk/ -name "*.apk" -exec aapt dump badging {} \;
          else
            echo "aapt not available"
          fi

