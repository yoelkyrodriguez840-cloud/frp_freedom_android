name: Build Android APK

on:
  push:
    branches: [main, develop, desarrollo]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:
    inputs:
      app_version:
        description: "Versión de la aplicación (ej: 1.0.0)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "Número de build (ej: 1)"
        required: false
        default: 1
        type: number

env:
  APP_VERSION: ${{ github.event.inputs.app_version || '1.0.0' }}
  BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
  FLET_VERBOSE: 1
  FLET_LOG_LEVEL: DEBUG
  FLET_ANDROID_BUILD: true
  FLET_CLI_NO_PROMPT: 1
  FLET_AGREE_TO_INSTALL_FLUTTER: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version from environment
        id: set_version
        run: |
          echo "=== Configurando versión desde variables de entorno ==="
          echo "APP_VERSION: ${{ env.APP_VERSION }}"
          echo "BUILD_NUMBER: ${{ env.BUILD_NUMBER }}"

          # Sanitizar versión (eliminar caracteres no válidos)
          VERSION=$(echo "${{ env.APP_VERSION }}" | sed 's/[^0-9.]*//g')
          BUILD_NUM=$(echo "${{ env.BUILD_NUMBER }}" | sed 's/[^0-9]*//g')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "tag_name=v${VERSION}-build${BUILD_NUM}" >> $GITHUB_OUTPUT

          echo "✅ Versión sanitizada: $VERSION"
          echo "✅ Build número: $BUILD_NUM"
          echo "✅ Tag name: v${VERSION}-build${BUILD_NUM}"

      - name: Debug - Verify directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in root directory ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "main.py" ] || [ -f "frp_freedom_android/android_app.py" ]; then
            echo "✅ Main application file found"
          else
            echo "❌ No main application file found!"
            echo "Buscando archivos Python..."
            find . -name "*.py" -type f | head -20
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found in root"
          else
            echo "❌ requirements.txt NOT found in root!"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libgtk-3-dev \
            mesa-utils \
            unzip \
            wget \
            curl \
            aapt \
            default-jre \
            default-jdk \
            file

      - name: Install dependencies
        run: |
          echo "Installing dependencies in: $(pwd)"
          pip install --upgrade pip

          # Eliminar cualquier referencia a jnius en requirements.txt
          if grep -q "jnius" requirements.txt 2>/dev/null; then
            echo "⚠️ Eliminando jnius de requirements.txt"
            sed -i '/jnius/d' requirements.txt
          fi

          # Instalar dependencias desde requirements.txt
          pip install -r requirements.txt || echo " Algunas dependencias fallaron, continuando..."

          # Instalar dependencias adicionales necesarias
          pip install watchdog repath typing-extensions anyio httpx httpcore h11 idna certifi

          # Verificar instalación de flet
          python -c "import flet; print(f'Flet version: {flet.__version__}')" || echo "⚠️ Flet no instalado correctamente"

      - name: Upgrade Flet to latest version
        run: |
          echo "=== Actualizando Flet ==="
          pip install --upgrade flet

          # Verificar versión
          python -c "import flet; print(f'Flet version: {flet.__version__}')"

          # Si Flet es >= 0.22.0, usar nuevas opciones
          python -c "
          import flet
          version = tuple(map(int, flet.__version__.split('.')))
          if version >= (0, 22, 0):
              print('✅ Flet 0.22+ detectado')
              import os
              os.makedirs('.flet', exist_ok=True)
              with open('.flet/version', 'w') as f:
                  f.write('0.22.0')
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: "stable"
          cache: true

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          # Crear estructura de directorios para Android SDK
          mkdir -p android-sdk/cmdline-tools

          # Descargar command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          # Extraer en una ubicación temporal
          unzip commandlinetools-linux-11076708_latest.zip -d tmp_cmdline

          # Mover a la ubicación correcta (cmdline-tools/latest/)
          mkdir -p android-sdk/cmdline-tools/latest
          mv tmp_cmdline/cmdline-tools/* android-sdk/cmdline-tools/latest/
          rm -rf tmp_cmdline

          # Configurar variables de entorno
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH

          # Agregar también al PATH actual
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"

          # Verificar estructura antes de continuar
          echo "=== Verifying Android SDK structure ==="
          ls -la android-sdk/cmdline-tools/latest/bin/ || echo "❌ sdkmanager directory not found!"
          which sdkmanager || echo "⚠️ sdkmanager not in PATH yet"

      - name: Accept Android Licenses and Install SDK Components
        run: |
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"

          # Aceptar licencias (sin interacción)
          yes | sdkmanager --licenses || true

          # Instalar las versiones correctas de Android SDK
          sdkmanager "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platforms;android-35"

      - name: Accept Flutter Android Licenses
        run: |
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          flutter config --android-sdk $ANDROID_SDK_ROOT
          yes | flutter doctor --android-licenses || true

      - name: Create .fletignore file
        run: |
          echo "# Exclude jnius and other problematic dependencies" > .fletignore
          echo "**/jnius*" >> .fletignore
          echo "**/pyjnius*" >> .fletignore
          echo "**/kivy*" >> .fletignore
          echo "**/build/*" >> .fletignore
          echo "**/__pycache__/*" >> .fletignore
          echo "**/*.pyc" >> .fletignore
          echo "**/tests/*" >> .fletignore
          echo "**/test_*.py" >> .fletignore
          echo "**/venv/*" >> .fletignore
          echo "**/.git/*" >> .fletignore
          echo "**/*.md" >> .fletignore
          echo "**/*.txt" >> .fletignore
          echo "**/*.yml" >> .fletignore
          echo "**/*.yaml" >> .fletignore
          echo "**/LICENSE*" >> .fletignore
          echo "*log" >> .fletignore
          echo "*.txt" >> .fletignore
          echo "*.md" >> .fletignore
          echo "*.fletignore" >> .fletignore
          echo "build_full.log" >> .fletignore
          echo "build/" >> .fletignore
          echo "dist/" >> .fletignore
          echo ".flet-build/" >> .fletignore
          echo "android/" >> .fletignore
          echo "release_apks" >> .fletignore
          echo "converted_apks" >> .fletignore
          echo "tmp_cmdline" >> .fletignore
          echo "android-sdk" >> .fletignore
          echo ".github/" >> .fletignore
          echo ".git/" >> .fletignore
          echo "venv/" >> .fletignore
          echo ".venv/" >> .fletignore
          echo "__pycache__/" >> .fletignore
          echo "*.pyc" >> .fletignore
          echo ".pytest_cache/" >> .fletignore
          echo ".mypy_cache/" >> .fletignore
          echo ".coverage" >> .fletignore
          echo "coverage.xml" >> .fletignore
          echo "**/jnius" >> .fletignore
          echo "**/pyjnius*" >> .fletignore
          echo "**/kivy*" >> .fletignore
          echo "**/plyer*" >> .fletignore

      # ============================================
      # CONSTRUCCIÓN PRINCIPAL CON SPLIT PER ABI
      # ============================================

      - name: Build APKs with split per ABI
        id: build_apk
        run: |
          echo "Building APKs with split per ABI in: $(pwd)"
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"
          export APP_VERSION="${{ steps.set_version.outputs.version }}"
          export BUILD_NUMBER="${{ steps.set_version.outputs.build_number }}"

          echo "=== Environment ==="
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "APP_VERSION: $APP_VERSION"
          echo "BUILD_NUMBER: $BUILD_NUMBER"
          echo "PATH: $PATH"
          echo "Python: $(which python)"
          echo "Python version: $(python --version)"
          echo "Pip: $(which pip)"

          # Verificar todas las dependencias
          echo "=== Dependencias instaladas ==="
          pip list

          # Verificar que no haya conflictos
          echo "=== Verificando conflictos ==="
          if pip check; then
            echo "✅ No hay conflictos de dependencias"
          else
            echo "⚠️ Conflictos detectados, intentando resolver..."
            pip install --upgrade flet pyyaml cryptography requests urllib3 msgpack
          fi

          # Verificar Flutter
          echo "=== Flutter doctor ==="
          flutter doctor -v

          # Limpiar construcciones anteriores
          echo "=== Limpiando construcciones anteriores ==="
          rm -rf build/ dist/ .flet-build/ android/

          # Verificar espacio en disco
          echo "=== Espacio en disco ==="
          df -h

          # Intentar construir con split per ABI
          echo "=== Iniciando construcción con split per ABI ==="
          echo "Comando: flet build apk --split-per-abi --build-number $BUILD_NUMBER --yes --verbose"

          # Ejecutar flet build con opciones adicionales
          set -x
          flet build apk \
            --split-per-abi \
            --build-number $BUILD_NUMBER \
            --yes \
            --verbose \
            2>&1 | tee build_full.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set +x

          echo "Exit code: $BUILD_EXIT_CODE"

          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ Construcción exitosa"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Error en la construcción (código: $BUILD_EXIT_CODE)"
            
            # Buscar errores específicos en el log
            echo "=== Buscando errores específicos ==="
            grep -E "error|exception|failed|FAILED" build_full.log | head -30
            
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Debug build directory
        if: always()
        run: |
          echo "=== Debug: Contenido del directorio después del build ==="
          echo "Directorio actual:"
          ls -la
          echo ""
          echo "Buscando directorios de build:"
          find . -type d -name "build" -o -name "dist" -o -name ".flet-build" | head -20
          echo ""
          echo "Buscando archivos .apk:"
          find . -name "*.apk" -type f 2>/dev/null || echo "No se encontraron APK"
          echo ""
          echo "Buscando archivos .aab:"
          find . -name "*.aab" -type f 2>/dev/null || echo "No se encontraron AAB"
          echo ""
          echo "Buscando archivos .apks:"
          find . -name "*.apks" -type f 2>/dev/null || echo "No se encontraron APKS"

      - name: Verify APK was created
        id: verify_apk
        run: |
          echo "=== Verificando que el APK fue creado ==="

          # Buscar archivos APK en todas las ubicaciones posibles
          APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null | grep -v "release_apks" || echo "")

          if [ -n "$APK_FILES" ]; then
            echo "✅ APK encontrado:"
            echo "$APK_FILES" | tr ' ' '\n'
            echo "apk_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ CRÍTICO: No se encontró ningún archivo APK"
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      # ============================================
      # ORGANIZAR Y RENOMBRAR APKS POR ARQUITECTURA
      # ============================================

      - name: Organize APKs by architecture
        id: organize_apks
        if: steps.verify_apk.outputs.apk_exists == 'true'
        run: |
          echo "=== Organizando APKs por arquitectura ==="

          # Crear directorio para APKs organizados
          mkdir -p release_apks

          # Obtener la versión desde las variables de entorno
          VERSION="${{ steps.set_version.outputs.version }}"
          BUILD_NUM="${{ steps.set_version.outputs.build_number }}"

          # Buscar todos los APK
          APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null | grep -v "release_apks")

          # Variable para contar APKs
          APK_COUNT=0

          for apk in $APK_FILES; do
            apk_name=$(basename "$apk")
            apk_dir=$(dirname "$apk")
            
            # Determinar la arquitectura por el nombre del archivo o ubicación
            if [[ "$apk_name" == *"arm64"* ]] || [[ "$apk_name" == *"arm64-v8a"* ]] || [[ "$apk_dir" == *"arm64-v8a"* ]]; then
              ARCH="arm64-v8a"
            elif [[ "$apk_name" == *"armeabi"* ]] || [[ "$apk_name" == *"armeabi-v7a"* ]] || [[ "$apk_dir" == *"armeabi-v7a"* ]]; then
              ARCH="armeabi-v7a"
            elif [[ "$apk_name" == *"x86_64"* ]] || [[ "$apk_dir" == *"x86_64"* ]]; then
              ARCH="x86_64"
            elif [[ "$apk_name" == *"x86"* ]] || [[ "$apk_dir" == *"x86"* ]]; then
              ARCH="x86"
            elif [[ "$apk_name" == *"universal"* ]] || [[ "$apk_dir" == *"universal"* ]]; then
              ARCH="universal"
            else
              # Intentar detectar por tamaño (los APK universales suelen ser más grandes)
              SIZE_MB=$(du -m "$apk" | cut -f1)
              if [ $SIZE_MB -gt 100 ]; then
                ARCH="universal"
              else
                # Si no se puede determinar, usar el nombre del directorio padre
                PARENT_DIR=$(basename "$(dirname "$apk")")
                ARCH="$PARENT_DIR"
              fi
            fi
            
            # Renombrar y copiar el APK
            NEW_NAME="FRP-Freedom-v${VERSION}-${ARCH}-build${BUILD_NUM}.apk"
            cp "$apk" "release_apks/$NEW_NAME"
            echo "✅ $apk_name → $NEW_NAME"
            
            # Registrar información
            echo "apk_${ARCH}_name=$NEW_NAME" >> $GITHUB_OUTPUT
            APK_COUNT=$((APK_COUNT + 1))
          done

          echo "apk_count=$APK_COUNT" >> $GITHUB_OUTPUT
          echo ""
          echo "=== Resumen de APKs organizados ==="
          ls -la release_apks/
          echo ""
          echo "=== Tamaños por APK ==="
          for apk in release_apks/*.apk; do
            echo "$(basename $apk): $(du -h $apk | cut -f1)"
          done

      # ============================================
      # ELIMINAR TAG EXISTENTE SI YA EXISTE
      # ============================================

      - name: Delete existing tag if it exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG_NAME="${{ steps.set_version.outputs.tag_name }}"
          echo "=== Verificando si el tag $TAG_NAME ya existe ==="

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "⚠️ Tag $TAG_NAME already exists, deleting it..."
            git push origin --delete "$TAG_NAME" || echo "No se pudo eliminar el tag"
          else
            echo "✅ Tag $TAG_NAME no existe, se creará uno nuevo"
          fi

      # ============================================
      # CREAR RELEASE CON MÚLTIPLES APKS
      # ============================================

      - name: Create Release with multiple APKs
        id: create_release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.verify_apk.outputs.apk_exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_version.outputs.tag_name }}
          name: "FRP Freedom v${{ steps.set_version.outputs.version }} (Build ${{ steps.set_version.outputs.build_number }})"
          body: |
            ## 🚀 FRP Freedom Android APK

            ### Información de la build
            - **Versión**: ${{ steps.set_version.outputs.version }}
            - **Build**: ${{ steps.set_version.outputs.build_number }}
            - **Fecha**: $(date)
            - **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### Contenido del Release
            - 1 APK Universal (compatible con todas las arquitecturas)
            - APKs específicos por arquitectura (menor tamaño)

            ### Notas
            - APK firmado con clave de depuración (debug)
            - Compatible con Android 7.0+ (API 24+)
            - **Recomendación**: Descarga el APK específico para tu arquitectura.

            ### 📱 Arquitecturas disponibles
            - **arm64-v8a**: Dispositivos Android modernos (recomendado)
            - **armeabi-v7a**: Dispositivos Android antiguos
            - **x86_64**: Emuladores y dispositivos Intel
            - **x86**: Emuladores antiguos
            - **Universal**: Compatible con todas (tamaño mayor)

          files: release_apks/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifacts (ZIP with all APKs)
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android-all
          path: release_apks/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload APK per architecture
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-universal
          path: release_apks/*universal*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-arm64-v8a
          path: release_apks/*arm64-v8a*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-armeabi-v7a
          path: release_apks/*armeabi-v7a*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-x86_64
          path: release_apks/*x86_64*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-x86
          path: release_apks/*x86*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload build logs (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_full.log
            build_fallback.log
            build.log
            *.log
          retention-days: 7

      # ============================================
      # PASOS DE INFORMACIÓN DEL RELEASE
      # ============================================

      - name: Output download links
        if: steps.verify_apk.outputs.apk_exists == 'true'
        run: |
          echo "================================================"
          echo " APKS GENERADOS EXITOSAMENTE"
          echo "================================================"
          echo ""
          echo "📱 APKS GENERADOS:"
          for apk in release_apks/*.apk; do
            if [ -f "$apk" ]; then
              echo "   $(basename $apk) - $(du -h $apk | cut -f1)"
            fi
          done
          echo ""
          echo "🔖 TAG: ${{ steps.set_version.outputs.tag_name }}"
          echo "📦 VERSIÓN: ${{ steps.set_version.outputs.version }}"
          echo "🔢 BUILD: ${{ steps.set_version.outputs.build_number }}"
          echo ""
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo " DESCARGA DIRECTA (RELEASE):"
            echo "   https://github.com/${{ github.repository }}/releases/tag/${{ steps.set_version.outputs.tag_name }}"
            echo ""
            echo " APKS DISPONIBLES:"
            for apk in release_apks/*.apk; do
              if [ -f "$apk" ]; then
                apk_name=$(basename "$apk")
                echo "   https://github.com/${{ github.repository }}/releases/download/${{ steps.set_version.outputs.tag_name }}/$apk_name"
              fi
            done
          else
            echo " ARTIFACTS (ZIP):"
            echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo " APKS EN ARTIFACTS:"
            for apk in release_apks/*.apk; do
              if [ -f "$apk" ]; then
                echo "   $(basename $apk) - $(du -h $apk | cut -f1)"
              fi
            done
          fi
          echo ""
          echo "================================================"

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          echo "Installing test dependencies in: $(pwd)"
          pip install --upgrade pip
          pip install -r requirements.txt || echo "⚠️ Algunas dependencias fallaron"
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          echo "Running tests in: $(pwd)"
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "⚠️ No tests directory found, skipping tests"
            echo '<?xml version="1.0"?><coverage></coverage>' > coverage.xml
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  android-compatibility:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && needs.build.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if artifact exists
        id: check_artifact
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifact = artifacts.artifacts.find(a => a.name === 'frp-freedom-android-all');
            if (artifact) {
              console.log('✅ Artifact found');
              core.setOutput('exists', 'true');
              core.setOutput('size', artifact.size_in_bytes);
              core.setOutput('created', artifact.created_at);
            } else {
              console.log('❌ Artifact not found');
              core.setOutput('exists', 'false');
            }

      - name: Download APKs
        if: steps.check_artifact.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-android-all
          path: apks/

      - name: Analyze APKs
        if: steps.check_artifact.outputs.exists == 'true'
        run: |
          echo "=== Análisis de APKs ==="
          APK_FILES=$(find apks/ -name "*.apk" -type f 2>/dev/null)

          if [ -n "$APK_FILES" ]; then
            echo ""
            echo "=== Archivos APK encontrados ==="
            
            for apk in $APK_FILES; do
              echo ""
              echo "=== Información del APK: $(basename $apk) ==="
              echo "Tamaño: $(du -h "$apk" | cut -f1)"
              echo "Ubicación: $apk"
              echo ""
              
              if command -v aapt &> /dev/null; then
                echo "Información detallada del APK:"
                aapt dump badging "$apk" || echo "⚠️ No se pudo leer la información del APK"
                echo ""
              fi
              
              echo "Estructura del APK:"
              unzip -l "$apk" | head -20 || echo "⚠️ No se pudo listar el contenido del APK"
              echo ""
            done
            
            echo ""
            echo "=== Resumen de tamaños ==="
            for apk in $APK_FILES; do
              echo "$(basename $apk): $(du -h "$apk" | cut -f1)"
            done
          else
            echo "❌ No se encontraron archivos APK para analizar"
            exit 1
          fi

      - name: Report missing artifact
        if: steps.check_artifact.outputs.exists == 'false'
        run: |
          echo "::warning::⚠️ No se encontró el artifact frp-freedom-android-all para analizar"
          echo "::warning::📱 Esto puede deberse a que:"
          echo "::warning::   - El job 'build' falló o se saltó"
          echo "::warning::   - Los APKs no se generaron correctamente"
          echo "::warning::   - El artifact expiró o fue eliminado"
          echo "::warning::🔍 Revisa los logs del job 'build' para más información"

      - name: Compatibility check summary
        if: always()
        run: |
          echo "=== Resumen de compatibilidad Android ==="
          if [ "${{ steps.check_artifact.outputs.exists }}" == "true" ]; then
            echo "✅ APKs disponibles para análisis"
            echo " Los APKs pueden ser probados en dispositivos Android"
            echo " Se generaron APKs por arquitectura para optimizar tamaño"
          else
            echo "❌ No hay APK disponible para análisis"
            echo " Se requiere revisar el proceso de construcción"
          fi
