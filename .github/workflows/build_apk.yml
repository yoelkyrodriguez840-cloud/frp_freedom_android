name: Build Android APK

on:
  push:
    branches: [main, develop]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Verify directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in root directory ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "main.py" ]; then
            echo "✅ main.py found in root"
          else
            echo "❌ main.py NOT found in root!"
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found in root"
          else
            echo "❌ requirements.txt NOT found in root!"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          echo "Installing dependencies in: $(pwd)"
          pip install -r requirements.txt
          pip install flet

      - name: Verify flet installation
        run: |
          echo "=== Verifying flet installation ==="
          python -c "import flet; print(f'Flet version: {flet.__version__}')"
          which flet || echo "flet not in PATH"
          flet --version || echo "flet command not available"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          # Crear estructura de directorios para Android SDK
          mkdir -p android-sdk/cmdline-tools

          # Descargar command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip

          # Extraer en una ubicación temporal
          unzip commandlinetools-linux-9477386_latest.zip -d tmp_cmdline

          # Mover a la ubicación correcta (cmdline-tools/latest/)
          mkdir -p android-sdk/cmdline-tools/latest
          mv tmp_cmdline/cmdline-tools/* android-sdk/cmdline-tools/latest/
          rm -rf tmp_cmdline

          # Configurar variables de entorno
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH

          # Agregar también al PATH actual
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"

          # Verificar estructura antes de continuar
          echo "=== Verifying Android SDK structure ==="
          ls -la android-sdk/cmdline-tools/latest/bin/ || echo "❌ sdkmanager directory not found!"
          which sdkmanager || echo "⚠️ sdkmanager not in PATH yet"

          # Aceptar licencias
          yes | sdkmanager --licenses

          # Instalar herramientas necesarias
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Build APK
        run: |
          echo "Building APK in: $(pwd)"
          echo "Using Android SDK at: $ANDROID_SDK_ROOT"
          # Usar el comando flet directamente (no python -m flet)
          flet build apk \
            --build-number ${{ github.run_number }} \
            --version 1.0.${{ github.run_number }} \
            --android-sdk $ANDROID_SDK_ROOT

      - name: Debug - List build output
        run: |
          echo "=== Checking build output ==="
          echo "Current directory: $(pwd)"
          echo ""
          echo "=== Directory contents ==="
          ls -la
          echo ""
          echo "=== Looking for build directory ==="
          if [ -d "build" ]; then
            echo "✅ Build directory found"
            echo ""
            echo "=== Build directory contents ==="
            ls -la build/
            echo ""
            echo "=== Looking for APK files ==="
            find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found in build"
          else
            echo "❌ Build directory not found"
            echo "Searching for any APK files..."
            find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android
          path: build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK to release (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-release
          path: build/**/*.apk
          retention-days: 90

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Verify files
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Files in root ==="
          ls -la
          echo ""
          echo "=== Checking for test files ==="
          if [ -d "tests" ]; then
            echo "✅ tests directory found"
            ls -la tests/
          else
            echo "⚠️ tests directory not found"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          echo "Installing test dependencies in: $(pwd)"
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          echo "Running tests in: $(pwd)"
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "⚠️ No tests directory found, skipping tests"
            echo '<?xml version="1.0"?><coverage></coverage>' > coverage.xml
          fi

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  android-compatibility:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-android
          path: apk/

      - name: Analyze APK
        run: |
          echo "=== APK Analysis ==="
          echo "APK Size:"
          ls -la apk/
          echo ""
          echo "APK Contents:"
          find apk/ -name "*.apk" -exec file {} \;
          echo ""
          echo "APK Info:"
          if command -v aapt &> /dev/null; then
            find apk/ -name "*.apk" -exec aapt dump badging {} \;
          else
            echo "aapt not available - installing..."
            sudo apt-get update && sudo apt-get install -y aapt
            find apk/ -name "*.apk" -exec aapt dump badging {} \;
          fi
