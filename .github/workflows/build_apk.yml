name: Build Android APK

on:
  push:
    branches: [main, develop]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List directory structure
        run: |
          echo "Current directory: $(pwd)"
          echo "All files:"
          find . -maxdepth 3 -type d | sort
          echo ""
          echo "Looking for frp_freedom_android:"
          find . -name "frp_freedom_android" -type d

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          # Verificar si existe el directorio
          if [ -d "frp_freedom_android" ]; then
            cd frp_freedom_android
            pip install -r requirements.txt
          else
            echo "ERROR: frp_freedom_android directory not found!"
            echo "Available directories:"
            ls -la
            exit 1
          fi
          pip install flet

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip -d android-sdk
          mkdir -p android-sdk/cmdline-tools
          mv android-sdk/cmdline-tools android-sdk/cmdline-tools/latest
          echo "ANDROID_SDK_ROOT=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Build APK
        run: |
          if [ -d "frp_freedom_android" ]; then
            cd frp_freedom_android
            python -m flet build apk \
              --build-number ${{ github.run_number }} \
              --version 1.0.${{ github.run_number }} \
              --android-sdk $ANDROID_SDK_ROOT
          else
            echo "ERROR: frp_freedom_android directory not found!"
            exit 1
          fi

      - name: Debug - List build output
        run: |
          echo "Listing build directory:"
          find . -path "*/build/*" -type f 2>/dev/null || echo "No build directory found"
          echo "Listing APK files:"
          find . -name "*.apk" 2>/dev/null || echo "No APK files found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-android
          path: frp_freedom_android/build/**/*.apk
          if-no-files-found: warn
          retention-days: 30
