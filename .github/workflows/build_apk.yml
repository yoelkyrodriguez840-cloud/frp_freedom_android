name: Build Android APK

on:
  push:
    branches: [main, develop, desarrollo]
    paths:
      - "frp_freedom_android/**"
      - ".github/workflows/build_apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "frp_freedom_android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Verify directory structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in root directory ==="
          ls -la
          echo ""
          echo "=== Checking for required files ==="
          if [ -f "main.py" ] || [ -f "frp_freedom_android/android_app.py" ]; then
            echo "✅ Main application file found"
          else
            echo "❌ No main application file found!"
            find . -name "*.py" -type f | head -20
            exit 1
          fi
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt found in root"
          else
            echo "❌ requirements.txt NOT found in root!"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        run: |
          mkdir -p android-sdk/cmdline-tools
          cd android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          cd ../..
          export ANDROID_SDK_ROOT="$PWD/android-sdk"
          export PATH="$PWD/android-sdk/cmdline-tools/latest/bin:$PATH"
          echo "yes" | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"

      - name: Create robust .fletignore file
        run: |
          cat > .fletignore << 'EOF'
          # Evitar que logs pesados entren en el empaquetado en caliente
          *.log
          *.txt
          *.md
          .fletignore
          build_full.log

          # Archivos y directorios de CI/CD o compilación previa
          build/
          dist/
          .flet-build/
          android/
          release_apks/
          converted_apks/
          tmp_cmdline/
          android-sdk/
          .github/
          .git/

          # Bloquear entornos virtuales locales o cachés del Action
          venv/
          .venv/
          __pycache__/
          *.pyc
          .pytest_cache/
          .mypy_cache/
          .coverage
          coverage.xml

          # Filtro estricto de dependencias no Android
          **/jnius*
          **/pyjnius*
          **/kivy*
          **/plyer*
          EOF
          echo "✅ .fletignore creado de forma exitosa."
          cat .fletignore

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Build APKs with split per ABI
        id: build_apk
        run: |
          echo "Building APKs with split per ABI..."
          export ANDROID_SDK_ROOT="${{ github.workspace }}/android-sdk"
          export PATH="${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:$PATH"

          # Forzar a Flet a procesar el build de forma limpia y desatendida
          export FLET_VERBOSE=0
          export FLET_CLI_NO_PROMPT=1
          export FLET_AGREE_TO_INSTALL_FLUTTER=1

          # Limpieza absoluta de residuos previos antes del empaquetado masivo
          rm -rf build/ dist/ .flet-build/ android/

          # Ejecución limpia del empaquetador Flet
          flet build apk --split-per-abi --build-number ${{ github.run_number }} --yes

      - name: Organize and verify output APKS
        run: |
          mkdir -p release_apks
          # Buscar los APKs generados en la ruta de distribución de Flet
          if [ -d "build/apk" ]; then
            find build/apk -name "*.apk" -exec cp {} release_apks/ \;
          elif [ -d "dist" ]; then
            find dist -name "*.apk" -exec cp {} release_apks/ \;
          fi
          echo "=== Contenido de release_apks ==="
          ls -lh release_apks/

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frp-freedom-apks
          path: release_apks/*.apk
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          echo "Executing test matrix..."
          # Puedes descomentar si usas pytest: python -m pytest

  android-compatibility:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download APKs for verification
        uses: actions/download-artifact@v4
        with:
          name: frp-freedom-apks
          path: downloaded_apks

      - name: Verify APK Integrity
        run: |
          echo "=== Analizando tamaño de los APKs limpios ==="
          ls -lh downloaded_apks/
